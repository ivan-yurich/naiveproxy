server:
    # Yurich DNS template.
    # Replace 10.0.0.1 with your VPN gateway IP.
    # Never bind 0.0.0.0 here.
    interface: 127.0.0.1
    interface: 10.0.0.1
    port: 53

    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Access policy: localhost + VPN clients only.
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/24 allow

    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-large-queries: yes
    harden-short-bufsize: yes
    qname-minimisation: yes
    aggressive-nsec: yes
    val-clean-additional: yes

    # Ubuntu's unbound package manages the DNSSEC trust anchor.
    # Do not duplicate auto-trust-anchor-file in this file.
    root-hints: "/usr/share/dns/root.hints"

    prefetch: yes
    prefetch-key: yes
    cache-min-ttl: 300
    cache-max-ttl: 86400
    rrset-cache-size: 128m
    msg-cache-size: 64m
    so-rcvbuf: 256k

    log-queries: no
    statistics-interval: 0
    verbosity: 1
